<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - The Corner Grill</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="logo">
        <span class="logo-mark" aria-hidden="true">🍽</span>
        <span>The Corner Grill</span>
      </div>
      <button class="menu-toggle" aria-label="Open menu">☰</button>
      <nav>
        <a href="index.html">Home</a>
        <a href="menu.html">Menu</a>
        <a href="about.html">About</a>
        <a class="active" href="contact.html">Book Table</a>
        <a class="order-link" href="menu.html">Order Online</a>
      </nav>
    </header>

    <main>
      <section class="contact-grid">
        <div class="page-panel">
          <h1>Contact</h1>
          <p>Visit us or send a quick message. We will reply soon.</p>
          <p><strong>Location:</strong> Times Square, New York, NY</p>
          <iframe
            title="The Corner Grill map"
            src="https://www.google.com/maps?q=Times+Square,+New+York,+NY&output=embed"
            loading="lazy"
          ></iframe>
        </div>

        <form class="contact-form page-panel">
          <label for="name">Name</label>
          <input id="name" name="name" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" required></textarea>

          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <footer>
      <div class="footer-col">
        <strong>Business Hours</strong>
        <p>Mon-Fri: 10am - 10pm</p>
        <p>Sat-Sun: 11am - 11pm</p>
      </div>
      <div class="footer-col">
        <strong>Follow Us</strong>
        <a href="https://www.facebook.com" target="_blank">Facebook</a>
        <a href="https://www.instagram.com" target="_blank">Instagram</a>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
